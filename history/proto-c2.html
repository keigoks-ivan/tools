<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proto C2 · 暖色夜空地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital@0;1&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#f3eee2;font-family:'Noto Serif TC',serif;padding:30px;color:#16140f}
.wrap{max-width:1180px;margin:0 auto}
h3{color:#8a3a23;font-family:'Cinzel',serif;letter-spacing:.2em;font-size:13px;margin:0 0 14px}
.note{font-size:13px;color:#665a45;font-family:'Cormorant Garamond',serif;font-style:italic;margin:0 0 18px}
.mapcard{position:relative;border-radius:14px;overflow:hidden;border:1px solid #a8842f;
  background:radial-gradient(ellipse at 50% 38%,#2a2012,#160f08 82%);
  box-shadow:0 20px 60px rgba(22,16,8,.5)}
.maptop{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 0;flex-wrap:wrap;gap:10px}
.mh{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.18em;color:#cda551;text-transform:uppercase}
.legend{display:flex;gap:16px;font-size:11px;color:#b9a982}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px 1px currentColor}
.legend .dn{color:#cda551}.legend .dc{color:#f0a830}
#m{width:100%;height:auto;display:block}
.tt{position:absolute;z-index:5;background:#2a2012;color:#f3eee2;border:1px solid #cda551;
  padding:7px 12px;font-size:12.5px;border-radius:6px;display:none;pointer-events:none;
  box-shadow:0 8px 22px rgba(0,0,0,.55);max-width:240px}
.tt.s{display:block}
.tt .k{color:#cda551;font-size:10px;letter-spacing:.1em}
@keyframes tw{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.glow{transform-box:fill-box;transform-origin:center;animation:tw 3.4s ease-in-out infinite}
</style></head><body><div class="wrap">
<h3>方案 C2 · 暖色夜空地圖（深褐夜空 + 金色發光地標）</h3>
<p class="note">與羊皮紙卡片同色溫的「黃昏星圖」：地標會緩緩明滅，亞洲群聚像星座。</p>
<div class="mapcard">
  <div class="maptop">
    <div class="mh">世界地圖 · 點擊任一地標 · Click any marker</div>
    <div class="legend"><span><i class="d dn"></i>國家 Nation</span><span><i class="d dc"></i>城市 City</span></div>
  </div>
  <svg id="m" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="tt" id="tt"></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
fetch('catalog.json').then(r=>r.json()).then(cat=>{
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json').then(r=>r.json()).then(world=>{
  var land=topojson.feature(world,world.objects.countries);
  var proj=d3.geoNaturalEarth1().fitSize([1000,500],{type:'Sphere'});
  var path=d3.geoPath(proj);
  var defs='<defs>'+
    '<filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'+
    '<radialGradient id="sea" cx="50%" cy="38%" r="70%"><stop offset="0%" stop-color="#3a2c18"/><stop offset="100%" stop-color="#160f08"/></radialGradient>'+
    '</defs>';
  var svg=defs;
  // sphere (sea) with warm radial
  svg+='<path d="'+path({type:'Sphere'})+'" fill="url(#sea)"/>';
  // scattered warm stars (deterministic)
  for(var s=0;s<140;s++){var sx=(s*137.5)%1000,sy=(s*97.3)%500,sr=(s%3)*0.35+0.25,op=((s%5)+2)/12;
    svg+='<circle cx="'+sx.toFixed(0)+'" cy="'+sy.toFixed(0)+'" r="'+sr.toFixed(2)+'" fill="#cdb98a" fill-opacity="'+op.toFixed(2)+'"/>';}
  // graticule faint warm
  svg+='<path d="'+path(d3.geoGraticule().step([30,30])())+'" fill="none" stroke="#6b4f25" stroke-opacity=".35" stroke-width=".5"/>';
  // land — dark warm with bronze edge
  land.features.forEach(f=>{var d=path(f);if(d)svg+='<path d="'+d+'" fill="#251a0e" stroke="#5e4520" stroke-width="0.6"/>';});
  var geo=cat.items.filter(i=>i.lat!=null);
  geo.forEach((i,idx)=>{var p=proj([i.lng,i.lat]);if(!p)return;
    var isC=i.cat==='city';var col=isC?'#f0a830':'#cda551';
    svg+='<g data-i="'+idx+'" style="cursor:pointer">'+
      '<circle class="glow" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(isC?2.6:4.2)+'" fill="'+col+'" filter="url(#g)"/>'+
      '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(isC?1.3:1.9)+'" fill="#fff4dc"/></g>';
  });
  var m=document.getElementById('m');m.innerHTML=svg;
  var tt=document.getElementById('tt');
  m.querySelectorAll('g[data-i]').forEach(g=>{var it=geo[+g.getAttribute('data-i')];
    g.onmouseenter=()=>{tt.innerHTML='<div class="k">'+(it.cat==='city'?'城市 CITY':'國家 NATION')+'</div>'+it.zh;tt.classList.add('s');};
    g.onmousemove=e=>{var r=m.getBoundingClientRect();var x=(e.clientX-r.left)/r.width*1000;
      var px=e.clientX-r.left+14,py=e.clientY-r.top+14;if(px>r.width-210)px=e.clientX-r.left-210;
      tt.style.left=px+'px';tt.style.top=py+'px';};
    g.onmouseleave=()=>tt.classList.remove('s');
    g.onclick=()=>location.href=it.slug+'.html';});
});});
</script></body></html>
