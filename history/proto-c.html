<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proto C · 夜空地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital@0;1&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#070d14;font-family:'Noto Serif TC',serif;padding:30px;color:#cbd5e1}
.wrap{max-width:1180px;margin:0 auto}
h3{color:#cda551;font-family:'Cinzel',serif;letter-spacing:.2em;font-size:13px;margin:0 0 14px}
.mapcard{position:relative;border-radius:14px;overflow:hidden;border:1px solid #1e3a5f;
  background:radial-gradient(ellipse at 50% 40%,#0f1e33,#070d14 80%);box-shadow:0 20px 60px rgba(0,0,0,.6)}
#m{width:100%;height:auto;display:block}
.tt{position:absolute;z-index:5;background:#0f1e33;color:#e8dcc0;border:1px solid #cda551;
  padding:6px 11px;font-size:12px;border-radius:5px;display:none;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.tt.s{display:block}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.glow{animation:pulse 3s ease-in-out infinite}
</style></head><body><div class="wrap">
<h3>方案 C · 夜空星圖風（發光地標）</h3>
<div class="mapcard">
  <svg id="m" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="tt" id="tt"></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
fetch('catalog.json').then(r=>r.json()).then(cat=>{
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json').then(r=>r.json()).then(world=>{
  var land=topojson.feature(world,world.objects.countries);
  var proj=d3.geoNaturalEarth1().fitSize([1000,500],{type:'Sphere'});
  var path=d3.geoPath(proj);
  var defs='<defs><filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  var svg=defs;
  // scattered stars
  for(var s=0;s<120;s++){var sx=(s*137.5)%1000,sy=(s*89.7)%500,sr=(s%3)*0.4+0.3;svg+='<circle cx="'+sx.toFixed(0)+'" cy="'+sy.toFixed(0)+'" r="'+sr+'" fill="#field" fill-opacity="0.4" fill="#7088a8"/>';}
  // graticule very faint
  svg+='<path d="'+path(d3.geoGraticule().step([30,30])())+'" fill="none" stroke="#1e3a5f" stroke-opacity=".4" stroke-width=".5"/>';
  // land — dark filled with glowing edge
  land.features.forEach(f=>{var d=path(f);if(d)svg+='<path d="'+d+'" fill="#13243d" stroke="#2d4a73" stroke-width="0.5"/>';});
  var geo=cat.items.filter(i=>i.lat!=null);
  geo.forEach((i,idx)=>{var p=proj([i.lng,i.lat]);if(!p)return;
    var isC=i.cat==='city';var col=isC?'#f59e0b':'#cda551';
    svg+='<g data-i="'+idx+'" style="cursor:pointer"><circle class="glow" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(isC?2.5:4)+'" fill="'+col+'" filter="url(#g)"/><circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(isC?1.4:2)+'" fill="#fff"/></g>';
  });
  var m=document.getElementById('m');m.innerHTML=svg;
  var tt=document.getElementById('tt');
  m.querySelectorAll('g[data-i]').forEach(g=>{var it=geo[+g.getAttribute('data-i')];
    g.onmouseenter=()=>{tt.textContent=it.zh;tt.classList.add('s');};
    g.onmousemove=e=>{var r=m.getBoundingClientRect();tt.style.left=(e.clientX-r.left+12)+'px';tt.style.top=(e.clientY-r.top+12)+'px';};
    g.onmouseleave=()=>tt.classList.remove('s');});
});});
</script></body></html>
