<!DOCTYPE html>
<html>
<head>
<style>
body { background: #eef3f9; font-family: sans-serif; padding: 20px; }
.box { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
.lang-en { display: inline; }
.lang-zh { display: none; }
</style>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<button onclick="setLang('zh')">切換中文</button>
<button onclick="setLang('en')">Switch EN</button>
<h2>Test 1: Vertical bar, 2 labels, barThickness:60</h2>
<div class="box">
  <div style="position:relative;height:220px;">
    <canvas id="c1"></canvas>
  </div>
</div>
<h2>Test 2: Horizontal bar, 9 labels, barThickness:16</h2>
<div class="box">
  <div style="position:relative;height:220px;">
    <canvas id="c2"></canvas>
  </div>
</div>
<h2>Test 3: Horizontal bar inside tab (lazy init)</h2>
<div class="box">
  <button onclick="showTab()">Show Tab</button>
  <div id="tab-content" style="display:none;">
    <div style="position:relative;height:220px;">
      <canvas id="c3"></canvas>
    </div>
  </div>
</div>
<h2>Test 4: Bar chart inside chart-grid two-col structure</h2>
<div class="chart-grid two-col">
  <div class="chart-card">
    <h3>Test Chart A (line - should work)</h3>
    <div style="position:relative;height:220px;">
      <canvas id="c4a"></canvas>
    </div>
  </div>
  <div class="chart-card">
    <h3>Test Chart B (bar - problem chart)</h3>
    <div style="position:relative;height:240px;">
      <canvas id="c4b"></canvas>
    </div>
  </div>
</div>
<script>
function setLang(lang) {
  document.querySelectorAll('.lang-en').forEach(e=>e.style.display=lang==='en'?'':'none');
  document.querySelectorAll('.lang-zh').forEach(e=>e.style.display=lang==='zh'?'':'none');
  localStorage.setItem('lang', lang);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
Chart.defaults.responsive = true;
Chart.defaults.maintainAspectRatio = false;
window.addEventListener('load', function() {
  setLang(localStorage.getItem('lang') || 'en');
  new Chart(document.getElementById('c1'), {
    type:'bar',
    data:{ labels:['WIP','Absorption'], datasets:[{data:[275000,85000],backgroundColor:['orange','green'],barThickness:60}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });
  new Chart(document.getElementById('c2'), {
    type:'bar',
    data:{ labels:['Perak','Johor','Sabah','Selangor','Penang','Kelantan','KL','N.Sembilan','Others'], datasets:[{data:[3300,3293,2771,2757,2730,2599,2287,2205,6730],backgroundColor:'navy',barThickness:16,minBarLength:2}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}}}
  });
  new Chart(document.getElementById('c4a'), {
    type: 'line',
    data: { labels: ['A','B','C','D'], datasets: [{ data: [1,3,2,4], borderColor: 'navy' }] },
    options: { responsive: true, maintainAspectRatio: false }
  });
  new Chart(document.getElementById('c4b'), {
    type: 'bar',
    data: {
      labels: ['Iskandar Puteri','JB City','Subang Jaya','National Avg','KL City','Penang GT'],
      datasets: [{ data: [5.60,5.47,5.40,5.19,4.60,3.77], backgroundColor: '#1e3a5f', maxBarThickness: 60 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
});
var c3done=false;
function showTab(){
  document.getElementById('tab-content').style.display='block';
  if(!c3done){c3done=true;
    new Chart(document.getElementById('c3'), {
      type:'bar',
      data:{ labels:['Perak','Johor','Sabah','Selangor','Penang','Kelantan','KL','N.Sembilan','Others'], datasets:[{data:[3300,3293,2771,2757,2730,2599,2287,2205,6730],backgroundColor:'navy',barThickness:16,minBarLength:2}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}}}
    });
  }
}
</script>
</body>
</html>
