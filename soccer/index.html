<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>世界盃 2026：阿根廷 vs 西班牙</title>
<style>
  html,body{margin:0;height:100%;background:#061006;overflow:hidden;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #hud{position:fixed;inset:0;pointer-events:none;color:#fff;user-select:none}
  /* 比分板 */
  #scoreboard{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
    background:rgba(6,10,20,.82);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:8px 18px;font-weight:800}
  .sb-team{font-size:17px;letter-spacing:1px}
  .sb-arg{color:#9fd4f7}.sb-esp{color:#ff6a6a}
  #sbScore{font-size:22px;color:#fff}
  #sbTime{font-size:14px;color:#ffd84f;margin-left:6px;font-variant-numeric:tabular-nums}
  #toast{position:absolute;top:30%;width:100%;text-align:center;font-size:52px;font-weight:900;letter-spacing:8px;
    color:#fff;text-shadow:0 0 26px rgba(80,255,140,.9),0 2px 8px rgba(0,0,0,.8);opacity:0;pointer-events:none}
  #toast.show{animation:toastIn 2.4s ease forwards}
  @keyframes toastIn{0%{opacity:0;transform:scale(.9)}12%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}
  #subtoast{position:absolute;top:42%;width:100%;text-align:center;font-size:20px;font-weight:700;color:#ffe9a0;
    text-shadow:0 1px 6px rgba(0,0,0,.8);opacity:0;pointer-events:none}
  #subtoast.show{animation:toastIn 2.4s ease forwards}
  #radar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);border:1px solid rgba(255,255,255,.3);
    border-radius:6px;background:rgba(4,30,10,.6)}
  #hint{position:absolute;bottom:6px;right:12px;font-size:12px;color:rgba(255,255,255,.45);text-align:right}
  #powerwrap{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:180px;height:10px;display:none;
    background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.4);border-radius:5px;overflow:hidden}
  #powerfill{height:100%;width:0%;background:linear-gradient(90deg,#ffd84f,#ff4f2e)}
  /* 覆蓋層 */
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(rgba(3,8,4,.55),rgba(3,8,4,.9)),radial-gradient(circle at 50% 30%, #0c4d1e, #052410 70%);color:#fff;z-index:10}
  .overlay h1{font-size:44px;margin:0 0 6px;letter-spacing:4px;text-shadow:0 0 24px rgba(90,255,150,.5)}
  .overlay h2{font-size:19px;margin:0 0 22px;font-weight:500;color:#cfe9d4}
  .overlay p{color:rgba(255,255,255,.75);font-size:14px;margin:4px 0}
  .overlay .btn{pointer-events:auto;cursor:pointer;margin-top:24px;padding:12px 46px;font-size:18px;font-weight:800;color:#052410;
    background:linear-gradient(90deg,#7dff9e,#37d068);border:none;border-radius:999px;box-shadow:0 0 24px rgba(80,255,140,.5)}
  .hidden{display:none!important}
  #vsRow{display:flex;align-items:center;gap:26px;margin:10px 0 6px}
  .vs-flag{font-size:52px}
  .vs-name{font-size:16px;font-weight:700;margin-top:4px}
  #vsX{font-size:26px;font-weight:900;color:#ffd84f}
  /* 觸控 UI */
  #touch{position:fixed;inset:0;pointer-events:none;display:none;z-index:5}
  body.is-touch #touch{display:block}
  body.is-touch #hint{display:none}
  #stickZone{position:absolute;left:0;bottom:0;width:45%;height:65%;pointer-events:auto;touch-action:none}
  #stickBase{position:absolute;width:110px;height:110px;border-radius:50%;border:2px solid rgba(160,255,190,.5);
    background:rgba(60,200,110,.12);display:none;transform:translate(-50%,-50%)}
  #stickKnob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(190,255,210,.55);
    box-shadow:0 0 14px rgba(80,255,140,.8);display:none;transform:translate(-50%,-50%)}
  .tbtn{position:absolute;pointer-events:auto;touch-action:none;width:62px;height:62px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;user-select:none;-webkit-user-select:none;
    background:rgba(40,140,80,.35);border:2px solid rgba(170,255,200,.55);text-shadow:0 0 8px rgba(0,0,0,.6)}
  .tbtn:active{background:rgba(255,216,79,.5)}
  #btnPass{right:26px;bottom:84px;width:76px;height:76px;font-size:19px}
  #btnShoot{right:116px;bottom:36px}
  #btnThru{right:36px;bottom:186px}
  #btnSlide{right:138px;bottom:130px}
  #btnSwitch{right:36px;bottom:274px;width:52px;height:52px;font-size:14px}
  #btnSprint{right:212px;bottom:48px;width:58px;height:58px}
  #rotate{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(3,8,4,.94);color:#d8ffe2;font-size:22px;text-align:center;line-height:1.8}
  @media (orientation: portrait){ body.is-touch #rotate{display:flex} }
  #mute{position:fixed;top:16px;right:16px;z-index:6;pointer-events:auto;cursor:pointer;font-size:18px;
    background:rgba(6,10,20,.6);border:1px solid rgba(255,255,255,.25);border-radius:50%;width:38px;height:38px;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<button id="mute">🔊</button>
<div id="rotate">📱 請把手機轉成橫向<br>球場視野最佳</div>
<div id="touch">
  <div id="stickZone">
    <div id="stickBase"></div>
    <div id="stickKnob"></div>
  </div>
  <div class="tbtn" id="btnPass">傳</div>
  <div class="tbtn" id="btnShoot">射</div>
  <div class="tbtn" id="btnThru">直</div>
  <div class="tbtn" id="btnSlide">鏟</div>
  <div class="tbtn" id="btnSwitch">換</div>
  <div class="tbtn" id="btnSprint">衝</div>
</div>
<div id="hud">
  <div id="scoreboard">
    <span class="sb-team sb-arg">ARG</span>
    <span id="sbScore">0 - 0</span>
    <span class="sb-team sb-esp">ESP</span>
    <span id="sbTime">1H 00:00</span>
  </div>
  <div id="toast"></div>
  <div id="subtoast"></div>
  <div id="powerwrap"><div id="powerfill"></div></div>
  <canvas id="radar" width="180" height="120"></canvas>
  <div id="hint">WASD 移動 · J 傳球 · E 直塞長傳 · K 長按射門 · Shift 衝刺 · Space 鏟球 · Q 換人</div>
</div>
<div id="title" class="overlay">
  <h1>世界盃 2026</h1>
  <div id="vsRow">
    <div style="text-align:center"><div class="vs-flag">🇦🇷</div><div class="vs-name" style="color:#9fd4f7">阿根廷</div></div>
    <div id="vsX">VS</div>
    <div style="text-align:center"><div class="vs-flag">🇪🇸</div><div class="vs-name" style="color:#ff6a6a">西班牙</div></div>
  </div>
  <h2>你操控阿根廷 — 真實名單 · 上下半場各 3 分鐘</h2>
  <p>WASD 移動 · J 傳球 · E 直塞 · K 長按蓄力射門 · Shift 衝刺 · Space 鏟球 · Q 換人</p>
  <button class="btn" id="startBtn">開球</button>
  <div id="loadtext" style="margin-top:14px;color:#9fd0a8;font-size:13px">載入中…</div>
</div>
<div id="fulltime" class="overlay hidden">
  <h1 id="ftTitle">終場</h1>
  <h2 id="ftScore">ARG 0 - 0 ESP</h2>
  <button class="btn" id="againBtn">再賽一場</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "../game/lib/three.module.js"
  }
}
</script>
<script type="module" src="main.js?v=20260719a"></script>
</body>
</html>
