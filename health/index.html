<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>體能日誌</title>
<meta name="color-scheme" content="light">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f9fc;color:#1e3a5f;padding-bottom:60px}
.topbar{background:#fff;border-bottom:1px solid #dce8f5;height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:14px;font-weight:700;letter-spacing:.06em;color:#1e3a5f;display:flex;align-items:center;gap:8px}
.brand .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-info{font-size:11px;color:#94a3b8}
.icon-btn{border:1px solid #dce8f5;background:#fff;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:#5a7a9a;font-family:inherit}
.icon-btn:hover{border-color:#3b82f6;color:#3b82f6}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.section-label{font-size:10px;letter-spacing:.18em;color:#3b82f6;font-weight:700;text-transform:uppercase;margin:28px 0 12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:"";flex:1;height:1px;background:#dce8f5}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid #dce8f5;border-radius:10px;padding:14px}
.kpi-icon{font-size:16px;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2}
.kpi-label{font-size:11px;color:#7fa3c4;margin-top:3px}
.chart-card{background:#fff;border:1px solid #dce8f5;border-radius:10px;padding:16px;margin-bottom:12px}
.chart-title{font-size:12.5px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.chart{width:100%;height:220px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
.list{background:#fff;border:1px solid #dce8f5;border-radius:10px;overflow:hidden}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f5fb;font-size:13px;gap:8px}
.row:last-child{border-bottom:none}
.row .main{font-weight:600}
.row .sub{font-size:11px;color:#94a3b8;margin-top:1px}
.row .right{text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
.muted{color:#94a3b8;font-size:12px;padding:14px;text-align:center}
.good{color:#16a34a}.warn{color:#d97706}.bad{color:#dc2626}
select,input[type=text],input[type=number],input[type=date],input[type=password]{border:1px solid #dce8f5;border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit;color:#1e3a5f;background:#fff;width:100%}
.btn{background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{background:#2c5282}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost{background:#fff;color:#5a7a9a;border:1px solid #dce8f5}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr 1fr}}
.form-grid label{font-size:11px;color:#7fa3c4;display:block;margin-bottom:3px}
.diet-btns{display:flex;gap:10px;margin-bottom:10px}
.diet-btn{flex:1;border:2px solid #dce8f5;background:#fff;border-radius:10px;padding:12px 4px;text-align:center;cursor:pointer;font-family:inherit}
.diet-btn .emoji{font-size:26px;display:block}
.diet-btn .lbl{font-size:12px;color:#5a7a9a;margin-top:4px;display:block}
.diet-btn.active{border-color:#3b82f6;background:#eff6ff}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;background:#eff6ff;color:#3b82f6;font-weight:600}
.del{color:#cbd5e1;cursor:pointer;font-size:15px;padding:0 4px}
.del:hover{color:#dc2626}
/* 設定面板 */
.overlay{position:fixed;inset:0;background:rgba(15,30,51,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:420px;width:100%}
.modal h3{font-size:15px;margin-bottom:6px}
.modal p{font-size:12px;color:#5a7a9a;margin-bottom:14px;line-height:1.6}
.modal label{font-size:11px;color:#7fa3c4;display:block;margin:10px 0 4px}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:12px;padding:10px 14px;border-radius:8px;margin:12px 0;display:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span>體能日誌 <span style="font-size:10px;color:#94a3b8;font-weight:400">PRIVATE</span></div>
  <div class="topbar-right">
    <span class="sync-info" id="syncInfo"></span>
    <button class="icon-btn" onclick="loadData()">↻ 重新整理</button>
    <button class="icon-btn" onclick="openSettings()">⚙︎</button>
  </div>
</div>

<div class="wrap">
  <div class="err" id="errBox"></div>

  <div class="section-label">總覽 OVERVIEW</div>
  <div class="cards" id="kpiCards"></div>

  <div class="section-label">有氧 CARDIO</div>
  <div class="chart-card">
    <div class="chart-title">近 14 天有氧時間（分鐘）</div>
    <div class="chart" id="cardioChart"></div>
  </div>
  <div class="list" id="cardioList"></div>

  <div class="section-label">重量訓練 STRENGTH</div>
  <div class="chart-card">
    <div class="chart-title">記錄訓練 <span class="tag" id="strengthDateTag"></span></div>
    <div class="form-grid">
      <div><label>日期</label><input type="date" id="stDate"></div>
      <div><label>動作</label><input type="text" id="stExercise" list="exList" placeholder="深蹲"><datalist id="exList"></datalist></div>
      <div><label>組數 × 次數</label><div style="display:flex;gap:6px"><input type="number" id="stSets" value="3" min="1"><input type="number" id="stReps" value="8" min="1"></div></div>
      <div><label>重量 kg（徒手填 0）</label><input type="number" id="stWeight" value="40" step="2.5" min="0"></div>
    </div>
    <button class="btn sm" onclick="addStrength()">＋ 加入這個動作</button>
  </div>
  <div class="chart-card">
    <div class="chart-title">力量進步（單日最大重量 kg）
      <select id="progExercise" style="width:auto" onchange="renderProgChart()"></select>
    </div>
    <div class="chart" id="progChart"></div>
  </div>
  <div class="list" id="strengthList"></div>

  <div class="section-label">飲食 DIET</div>
  <div class="chart-card">
    <div class="chart-title">今天吃得怎麼樣？</div>
    <div class="diet-btns" id="dietBtns">
      <button class="diet-btn" data-rating="1" onclick="checkInDiet(1)"><span class="emoji">🥗</span><span class="lbl">乾淨</span></button>
      <button class="diet-btn" data-rating="2" onclick="checkInDiet(2)"><span class="emoji">🍱</span><span class="lbl">普通</span></button>
      <button class="diet-btn" data-rating="3" onclick="checkInDiet(3)"><span class="emoji">🍕</span><span class="lbl">放縱</span></button>
    </div>
    <input type="text" id="dietNote" placeholder="備註（吃了什麼、外食…）— 打卡後自動儲存" onchange="saveDietNote()">
  </div>
  <div class="list" id="dietList"></div>

  <div class="section-label">睡眠 SLEEP</div>
  <div class="chart-card">
    <div class="chart-title">近 14 晚睡眠（小時，含階段）</div>
    <div class="chart" id="sleepChart"></div>
  </div>
  <div class="list" id="sleepList"></div>
</div>

<!-- 設定 -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h3>連接設定</h3>
    <p>第一次使用：填入你的 Worker API 網址與 token（部署 health-api 時產生的那組）。只存在這台裝置的瀏覽器裡，不會上傳。</p>
    <label>API 網址</label>
    <input type="text" id="cfgUrl" placeholder="https://health-api.xxx.workers.dev">
    <label>API Token</label>
    <input type="password" id="cfgToken" placeholder="貼上 token">
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn ghost sm" onclick="closeSettings()">取消</button>
      <button class="btn sm" onclick="saveSettings()">儲存並連線</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
"use strict";
/* ============ 設定 ============ */
var CFG = null;
try { CFG = JSON.parse(localStorage.getItem("healthCfg")); } catch(e){}
var DB = [];          // /data 回傳的 days（index 0 = 今天）
var allCharts = [];
var COMMON_EX = ["深蹲","硬舉","臥推","肩推","划船","引體向上","滑輪下拉","二頭彎舉","三頭下壓","腿推","腿彎舉","羅馬尼亞硬舉","臀推"];
var C = { blue:"#3b82f6", navy:"#1e3a5f", teal:"#14b8a6", green:"#22c55e", orange:"#f59e0b", red:"#ef4444", indigo:"#6366f1", cyan:"#22d3ee", grey:"#cbd5e1", pink:"#ec4899" };

function openSettings(){
  document.getElementById("cfgUrl").value = CFG ? CFG.url : "";
  document.getElementById("cfgToken").value = CFG ? CFG.token : "";
  document.getElementById("settingsOverlay").classList.add("show");
}
function closeSettings(){ document.getElementById("settingsOverlay").classList.remove("show"); }
function saveSettings(){
  var url = document.getElementById("cfgUrl").value.trim().replace(/\/+$/,"");
  var token = document.getElementById("cfgToken").value.trim();
  if(!url || !token){ alert("兩個欄位都要填"); return; }
  CFG = { url:url, token:token };
  localStorage.setItem("healthCfg", JSON.stringify(CFG));
  closeSettings();
  loadData();
}

/* ============ 資料 ============ */
function showErr(msg){
  var b = document.getElementById("errBox");
  b.textContent = msg; b.style.display = "block";
}
function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({ "Authorization":"Bearer "+CFG.token, "Content-Type":"application/json" }, opts.headers||{});
  return fetch(CFG.url+path, opts).then(function(r){
    if(!r.ok) throw new Error("API "+r.status);
    return r.json();
  });
}
function loadData(){
  document.getElementById("errBox").style.display = "none";
  if(!CFG){ openSettings(); return; }
  api("/data?days=30").then(function(res){
    DB = res.days || [];
    renderAll();
  }).catch(function(e){
    showErr("讀取失敗："+e.message+"（token 或網址錯誤？點右上 ⚙︎ 檢查）");
  });
}
function localISO(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayISO(){ return localISO(new Date()); }
function fmtDay(iso){
  var d = new Date(iso+"T00:00:00");
  var wd = ["日","一","二","三","四","五","六"][d.getDay()];
  return (d.getMonth()+1)+"/"+d.getDate()+"（"+wd+"）";
}
function byDate(iso){
  for(var i=0;i<DB.length;i++) if(DB[i].date===iso) return DB[i];
  return null;
}

/* ============ 渲染 ============ */
function renderAll(){
  renderKPI();
  renderCardio();
  renderStrength();
  renderDiet();
  renderSleep();
  var t = byDate(todayISO());
  var syncedAt = t && t.health && t.health.syncedAt;
  document.getElementById("syncInfo").textContent = syncedAt
    ? "同步於 "+new Date(syncedAt).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})
    : "今日尚未同步";
}

function dietStreak(){
  var ok = {};
  DB.forEach(function(d){ if(d.diet && d.diet.rating!==3) ok[d.date]=1; });
  var n=0, cur=new Date();
  if(!ok[localISO(cur)]) cur.setDate(cur.getDate()-1);
  while(ok[localISO(cur)]){ n++; cur.setDate(cur.getDate()-1); }
  return n;
}

function renderKPI(){
  var t = byDate(todayISO()), h = (t&&t.health)||{};
  var latestSleep=null, latestWeight=null;
  for(var i=0;i<DB.length;i++){
    var hh=DB[i].health||{};
    if(latestSleep===null && hh.sleepAsleep) latestSleep=hh.sleepAsleep;
    if(latestWeight===null && hh.weightKg) latestWeight=hh.weightKg;
  }
  var weekStrengthDays=0, weekCardioMin=0;
  for(var j=0;j<Math.min(7,DB.length);j++){
    var d=DB[j];
    if(d.strength && d.strength.length) weekStrengthDays++;
    ((d.health&&d.health.workouts)||[]).forEach(function(w){ weekCardioMin+=w.min; });
  }
  var cards=[
    {i:"👟",v:h.steps!=null?Math.round(h.steps).toLocaleString():"—",l:"今日步數"},
    {i:"🔥",v:h.activeKcal!=null?Math.round(h.activeKcal)+" kcal":"—",l:"今日活動消耗"},
    {i:"🛏️",v:latestSleep!=null?latestSleep.toFixed(1)+" 小時":"—",l:"最近一晚睡眠"},
    {i:"❤️",v:h.restingHR!=null?Math.round(h.restingHR)+" bpm":"—",l:"靜止心率"},
    {i:"🏋️",v:weekStrengthDays+" 天",l:"近 7 天重訓"},
    {i:"🏃",v:Math.round(weekCardioMin)+" 分鐘",l:"近 7 天有氧"},
    {i:"🥗",v:dietStreak()+" 天",l:"飲食連續達標"},
    {i:"⚖️",v:latestWeight!=null?latestWeight.toFixed(1)+" kg":"—",l:"最新體重"}
  ];
  document.getElementById("kpiCards").innerHTML = cards.map(function(c){
    return '<div class="kpi"><div class="kpi-icon">'+c.i+'</div><div class="kpi-value">'+c.v+'</div><div class="kpi-label">'+c.l+'</div></div>';
  }).join("");
}

function mkChart(id){
  var el=document.getElementById(id);
  var ch=echarts.getInstanceByDom(el)||echarts.init(el);
  if(allCharts.indexOf(ch)<0) allCharts.push(ch);
  return ch;
}
var AXIS={axisLine:{lineStyle:{color:"#dce8f5"}},axisLabel:{color:"#7fa3c4",fontSize:10},axisTick:{show:false}};
var GRID={left:36,right:10,top:14,bottom:22};

function last14(){ return DB.slice(0,14).reverse(); }

function renderCardio(){
  var days=last14();
  mkChart("cardioChart").setOption({
    grid:GRID,tooltip:{trigger:"axis"},
    xAxis:Object.assign({type:"category",data:days.map(function(d){return d.date.slice(5).replace("-","/");})},AXIS),
    yAxis:Object.assign({type:"value",splitLine:{lineStyle:{color:"#f0f5fb"}}},AXIS),
    series:[{type:"bar",data:days.map(function(d){
      var m=0;((d.health&&d.health.workouts)||[]).forEach(function(w){m+=w.min;});
      return Math.round(m);
    }),itemStyle:{color:C.teal,borderRadius:[3,3,0,0]},barMaxWidth:26}]
  });
  var rows=[];
  DB.forEach(function(d){
    ((d.health&&d.health.workouts)||[]).forEach(function(w){
      rows.push('<div class="row"><div><div class="main">'+w.type+'</div><div class="sub">'+fmtDay(d.date)+'</div></div>'+
        '<div class="right"><div class="main">'+Math.round(w.min)+' 分鐘</div><div class="sub">'+
        (w.km?w.km.toFixed(1)+" km · ":"")+(w.kcal?Math.round(w.kcal)+" kcal":"")+(w.hr?" · ♥︎"+Math.round(w.hr):"")+'</div></div></div>');
    });
  });
  document.getElementById("cardioList").innerHTML = rows.length?rows.join(""):'<div class="muted">尚無紀錄——捷徑同步後，Apple Watch 記的運動會自動出現</div>';
}

/* ---- 重訓 ---- */
function exerciseNames(){
  var seen=[];
  DB.forEach(function(d){(d.strength||[]).forEach(function(e){ if(seen.indexOf(e.exercise)<0) seen.push(e.exercise); });});
  COMMON_EX.forEach(function(x){ if(seen.indexOf(x)<0) seen.push(x); });
  return seen;
}
function renderStrength(){
  document.getElementById("exList").innerHTML = exerciseNames().map(function(x){return '<option value="'+x+'">';}).join("");
  if(!document.getElementById("stDate").value) document.getElementById("stDate").value = todayISO();
  var logged=[];
  DB.forEach(function(d){(d.strength||[]).forEach(function(e){ if(logged.indexOf(e.exercise)<0) logged.push(e.exercise); });});
  var sel=document.getElementById("progExercise");
  var cur=sel.value;
  sel.innerHTML=logged.map(function(x){return '<option'+(x===cur?" selected":"")+'>'+x+'</option>';}).join("");
  renderProgChart();
  var rows=[];
  DB.forEach(function(d){
    if(!d.strength||!d.strength.length) return;
    var items=d.strength.map(function(e,i){
      return '<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:2px 0"><span>'+e.exercise+'</span>'+
        '<span style="color:#5a7a9a">'+e.sets+'×'+e.reps+(e.weight>0?' @ '+e.weight+' kg':' 徒手')+
        ' <span class="del" onclick="delStrength(\''+d.date+'\','+i+')">✕</span></span></div>';
    }).join("");
    rows.push('<div class="row" style="display:block"><div class="main" style="margin-bottom:4px">'+fmtDay(d.date)+'</div>'+items+'</div>');
  });
  document.getElementById("strengthList").innerHTML = rows.length?rows.join(""):'<div class="muted">還沒有訓練紀錄——用上面的表單記第一筆</div>';
}
function renderProgChart(){
  var ex=document.getElementById("progExercise").value;
  var pts=[];
  DB.slice().reverse().forEach(function(d){
    var mx=0;
    (d.strength||[]).forEach(function(e){ if(e.exercise===ex && e.weight>mx) mx=e.weight; });
    if(mx>0) pts.push([d.date.slice(5).replace("-","/"),mx]);
  });
  mkChart("progChart").setOption({
    grid:GRID,tooltip:{trigger:"axis"},
    xAxis:Object.assign({type:"category",data:pts.map(function(p){return p[0];})},AXIS),
    yAxis:Object.assign({type:"value",scale:true,splitLine:{lineStyle:{color:"#f0f5fb"}}},AXIS),
    series:[{type:"line",data:pts.map(function(p){return p[1];}),itemStyle:{color:C.blue},lineStyle:{color:C.blue,width:2},symbolSize:7}]
  },true);
}
function addStrength(){
  var date=document.getElementById("stDate").value||todayISO();
  var ex=document.getElementById("stExercise").value.trim();
  var sets=parseInt(document.getElementById("stSets").value)||0;
  var reps=parseInt(document.getElementById("stReps").value)||0;
  var w=parseFloat(document.getElementById("stWeight").value)||0;
  if(!ex||sets<1){ alert("動作與組數必填"); return; }
  var day=byDate(date);
  var entries=(day&&day.strength?day.strength.slice():[]);
  entries.push({exercise:ex,sets:sets,reps:reps,weight:w});
  api("/strength",{method:"POST",body:JSON.stringify({date:date,entries:entries})})
    .then(loadData).catch(function(e){showErr("儲存失敗："+e.message);});
}
function delStrength(date,idx){
  var day=byDate(date); if(!day||!day.strength) return;
  var entries=day.strength.slice(); entries.splice(idx,1);
  api("/strength",{method:"POST",body:JSON.stringify({date:date,entries:entries})})
    .then(loadData).catch(function(e){showErr("刪除失敗："+e.message);});
}

/* ---- 飲食 ---- */
var DIET_META={1:{e:"🥗",l:"乾淨"},2:{e:"🍱",l:"普通"},3:{e:"🍕",l:"放縱"}};
function renderDiet(){
  var t=byDate(todayISO());
  var rating=t&&t.diet?t.diet.rating:0;
  document.querySelectorAll(".diet-btn").forEach(function(b){
    b.classList.toggle("active", parseInt(b.dataset.rating)===rating);
  });
  if(t&&t.diet&&t.diet.note) document.getElementById("dietNote").value=t.diet.note;
  var rows=[];
  DB.forEach(function(d){
    if(!d.diet) return;
    var m=DIET_META[d.diet.rating]||{e:"",l:""};
    rows.push('<div class="row"><div><div class="main">'+m.e+' '+m.l+'</div>'+
      (d.diet.note?'<div class="sub">'+d.diet.note+'</div>':'')+'</div><div class="right sub">'+fmtDay(d.date)+'</div></div>');
  });
  document.getElementById("dietList").innerHTML = rows.length?rows.join(""):'<div class="muted">還沒打過卡</div>';
}
function checkInDiet(rating){
  api("/diet",{method:"POST",body:JSON.stringify({date:todayISO(),rating:rating,note:document.getElementById("dietNote").value})})
    .then(loadData).catch(function(e){showErr("打卡失敗："+e.message);});
}
function saveDietNote(){
  var t=byDate(todayISO());
  if(t&&t.diet) checkInDiet(t.diet.rating);
}

/* ---- 睡眠 ---- */
function renderSleep(){
  var days=last14();
  function stage(d,k){ return (d.health&&d.health[k])||0; }
  var hasStages=days.some(function(d){return stage(d,"sleepDeep")>0;});
  var series;
  if(hasStages){
    series=[
      {name:"深層",color:C.indigo,key:"sleepDeep"},
      {name:"核心",color:C.blue,key:"sleepCore"},
      {name:"REM",color:C.cyan,key:"sleepRem"}
    ].map(function(s){
      return {name:s.name,type:"bar",stack:"s",itemStyle:{color:s.color},barMaxWidth:26,
        data:days.map(function(d){var v=stage(d,s.key);return v?+v.toFixed(2):0;})};
    });
    series.push({name:"其他",type:"bar",stack:"s",itemStyle:{color:C.grey},barMaxWidth:26,
      data:days.map(function(d){
        var o=stage(d,"sleepAsleep")-stage(d,"sleepDeep")-stage(d,"sleepCore")-stage(d,"sleepRem");
        return o>0.05?+o.toFixed(2):0;
      })});
  } else {
    series=[{name:"睡眠",type:"bar",itemStyle:{color:C.indigo,borderRadius:[3,3,0,0]},barMaxWidth:26,
      data:days.map(function(d){return +stage(d,"sleepAsleep").toFixed(2);})}];
  }
  mkChart("sleepChart").setOption({
    grid:GRID,tooltip:{trigger:"axis"},legend:hasStages?{top:0,right:0,itemWidth:10,itemHeight:10,textStyle:{fontSize:10,color:"#7fa3c4"}}:undefined,
    xAxis:Object.assign({type:"category",data:days.map(function(d){return d.date.slice(5).replace("-","/");})},AXIS),
    yAxis:Object.assign({type:"value",splitLine:{lineStyle:{color:"#f0f5fb"}}},AXIS),
    series:series
  },true);
  var rows=[];
  DB.forEach(function(d){
    var h=d.health||{};
    if(!h.sleepAsleep) return;
    var cls = h.sleepAsleep>=7?"good":(h.sleepAsleep>=6?"warn":"bad");
    var subs=[];
    if(h.sleepDeep) subs.push("深層 "+h.sleepDeep.toFixed(1)+"h");
    if(h.sleepRem) subs.push("REM "+h.sleepRem.toFixed(1)+"h");
    rows.push('<div class="row"><div><div class="main">'+fmtDay(d.date)+'</div>'+
      (subs.length?'<div class="sub">'+subs.join(" · ")+'</div>':'')+'</div>'+
      '<div class="right main '+cls+'">'+h.sleepAsleep.toFixed(1)+' 小時</div></div>');
  });
  document.getElementById("sleepList").innerHTML = rows.length?rows.join(""):'<div class="muted">尚無睡眠紀錄——戴 Apple Watch 睡覺＋捷徑同步後自動出現</div>';
}

window.addEventListener("resize",function(){ allCharts.forEach(function(c){c.resize();}); });
if(CFG) loadData(); else openSettings();
</script>
</body>
</html>
